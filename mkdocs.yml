site_name: Dashforge
site_description: A JSON-first dashboard framework with AI-powered visual builder
site_url: https://plexusone.github.io/dashforge
repo_url: https://github.com/plexusone/dashforge
repo_name: plexusone/dashforge

theme:
  name: material
  custom_dir: docs/overrides
  palette:
    # Dark mode first (PlexusOne default)
    - scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
    - scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
  features:
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.highlight
    - content.code.copy

extra_css:
  - https://plexusone.dev/css/plexusone-mkdocs.css

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - admonition
  - pymdownx.details
  - tables
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Dashboard Builder:
      - Overview: builder.md
      - Cube.js Integration: cube-integration.md
      - AI Features: ai-features.md
  - User Guide:
      - Dashboard IR: dashboard-ir.md
      - Widgets: widgets.md
      - Data Sources: data-sources.md
      - Transforms: transforms.md
  - Server:
      - Configuration: server-config.md
      - Authentication: authentication.md
      - Authorization: authorization.md
      - Multi-tenancy: multi-tenancy.md
  - Marketplace:
      - Overview: marketplace/overview.md
      - Publishing Templates: marketplace/publishing.md
      - Licensing: marketplace/licensing.md
  - API Reference: https://pkg.go.dev/github.com/plexusone/dashforge
  - Development: development.md
  - Releases:
      - Changelog: changelog.md
      - v0.2.0: releases/v0.2.0.md
      - v0.1.0: releases/v0.1.0.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/plexusone/dashforge
